<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Tracker</title>
  </head>
  <body>
    <h1>Character Tracker</h1>
    <p>Welcome to your character tracker!</p>
    <h2>Add Character</h2>
    <form>
      <label for="characterName">Character Name</label>
      <input type="text" id="characterName">
      <label for="characterType">Character Type</label>
      <input type="text" id="characterType">
      <label for="characterBio">Bio</label>
      <textarea id="characterBio"></textarea>
      <button type="submit">Add Character</button>
    </form>
  </body>
</html>
